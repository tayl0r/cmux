name: Run display resolution regression attempt
description: Run the display resolution churn XCUITest on WarpBuild.
outputs:
  test_started:
    description: Whether the display regression step started.
    value: ${{ steps.run-display-regression.outputs.test_started }}
  passed:
    description: Whether the display regression passed.
    value: ${{ steps.mark-passed.outputs.passed }}
runs:
  using: composite
  steps:
    - name: Select Xcode
      shell: bash
      run: |
        set -euo pipefail
        if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
          XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
        else
          XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort | tail -n 1 || true)"
          if [ -n "$XCODE_APP" ]; then
            XCODE_DIR="$XCODE_APP/Contents/Developer"
          else
            echo "No Xcode.app found under /Applications" >&2
            exit 1
          fi
        fi
        echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
        export DEVELOPER_DIR="$XCODE_DIR"
        xcodebuild -version
        xcrun --sdk macosx --show-sdk-path

    - name: Capture GhosttyKit cache key
      id: ghosttykit-cache-key
      shell: bash
      run: echo "ghostty_sha=$(git -C ghostty rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    - name: Cache GhosttyKit.xcframework
      id: cache-ghosttykit-display
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
      with:
        path: GhosttyKit.xcframework
        key: ghosttykit-${{ hashFiles('.gitmodules') }}-${{ steps.ghosttykit-cache-key.outputs.ghostty_sha }}

    - name: Download pre-built GhosttyKit.xcframework
      if: steps.cache-ghosttykit-display.outputs.cache-hit != 'true'
      shell: bash
      run: ./scripts/download-prebuilt-ghosttykit.sh

    - name: Install zig
      shell: bash
      run: ./scripts/install-zig.sh

    - name: Cache Swift packages
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
      with:
        path: .ci-source-packages
        key: spm-ui-display-resolution-${{ hashFiles('GhosttyTabs.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
        restore-keys: spm-ui-display-resolution-

    - name: Resolve Swift packages
      shell: bash
      run: |
        set -euo pipefail
        SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
        mkdir -p "$SOURCE_PACKAGES_DIR"

        for attempt in 1 2 3; do
          if xcodebuild -project GhosttyTabs.xcodeproj -scheme cmux -configuration Debug \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -resolvePackageDependencies; then
            exit 0
          fi
          if [ "$attempt" -eq 3 ]; then
            echo "Failed to resolve Swift packages after 3 attempts" >&2
            exit 1
          fi
          echo "Package resolution failed on attempt $attempt, retrying..."
          sleep $((attempt * 5))
        done

    - name: Run display resolution churn UI regression
      id: run-display-regression
      shell: bash
      run: |
        set -euo pipefail
        echo "test_started=true" >> "$GITHUB_OUTPUT"
        SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
        HELPER_PATH="/tmp/create-virtual-display"
        MANIFEST_PATH="/tmp/cmux-ui-test-display-harness.json"

        rm -f "$MANIFEST_PATH"
        trap 'rm -f "$MANIFEST_PATH"' EXIT

        clang -framework Foundation -framework CoreGraphics \
          -o "$HELPER_PATH" scripts/create-virtual-display.m

        printf '{"helperBinaryPath":"%s"}\n' "$HELPER_PATH" >"$MANIFEST_PATH"

        xcodebuild -project GhosttyTabs.xcodeproj -scheme cmux -configuration Debug \
          -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
          -disableAutomaticPackageResolution \
          -destination "platform=macOS" \
          -only-testing:cmuxUITests/DisplayResolutionRegressionUITests \
          test

    - name: Mark display regression passed
      if: ${{ success() }}
      id: mark-passed
      shell: bash
      run: echo "passed=true" >> "$GITHUB_OUTPUT"
